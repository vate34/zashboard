name: Sync with Upstream (main & gh-pages)

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 时间 00:00 同步一次
  workflow_dispatch:     # 支持手动触发

jobs:
  sync-main:
    name: Sync main branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork (main)
        uses: actions/checkout@v4
        with:
          repository: vate34/zashboard
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with upstream (main)
        uses: codacy/github-action-sync-fork@master
        with:
          target-branch: main
          upstream-repo: Zephyruso/zashboard
          upstream-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}

  sync-gh-pages:
    name: Sync gh-pages branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork (gh-pages)
        uses: actions/checkout@v4
        with:
          repository: vate34/zashboard
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with upstream (gh-pages)
        uses: codacy/github-action-sync-fork@master
        with:
          target-branch: gh-pages
          upstream-repo: Zephyruso/zashboard
          upstream-branch: gh-pages
          github-token: ${{ secrets.GITHUB_TOKEN }}
